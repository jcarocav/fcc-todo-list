<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Todo List</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>My To-Do List</h1>

    <ul class="todo-list">
      
      <li>
        <input type="checkbox" id="task-1" />
        <label for="task-1">Comprar pan</label>
        <ul class="sub-item">
          <li>
            <a href="https://google.com" class="sub-item-link" class="sub-item-link" target="_blank">Ver panadería</a>
          </li>
        </ul>
      </li>
     
      <li>
        <input type="checkbox" id="task-2" />
        <label for="task-2">Estudiar CSS</label>
        <ul class="sub-item">
          <li>
            <a href="https://freecodecamp.org" class="sub-item-link" target="_blank">Abrir curso</a>
          </li>
        </ul>
      </li>
      
      <li>
        <input type="checkbox" id="task-3" />
        <label for="task-3">Hacer ejercicio</label>
        <ul class="sub-item">
          <li>
            <a href="https://youtube.com" class="sub-item-link" target="_blank">Ver rutina</a>
          </li>
        </ul>
      </li>
      
      <li>
        <input type="checkbox" id="task-4" />
        <label for="task-4">Limpiar casa</label>
        <ul class="sub-item">
          <li>
            <a href="https://amazon.com" class="sub-item-link" target="_blank">Comprar cloro</a>
          </li>
        </ul>
      </li>
    </ul>
  </body>
</html>
